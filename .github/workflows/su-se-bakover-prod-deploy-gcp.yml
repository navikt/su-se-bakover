name: Deploy to prod automatically on published release - GCP


on:
  release:
    types: [published]

permissions: {}

jobs:
  check-image:
    name: Check if image exists
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Login to NAIS registry
        id: login
        uses: nais/login@v0
        with:
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: nais-management-233d
          team: supstonad
      - name: Check image tag
        id: check
        shell: bash
        run: |
          image="${{ steps.login.outputs.registry }}/su-se-bakover-app:${{ github.sha }}"
          if docker manifest inspect "$image" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-test-push-image:
    name: Build, test and push image
    needs: check-image
    if: needs.check-image.outputs.exists != 'true'
    runs-on: ubuntu-latest-8-cores
    permissions:
      contents: read
      id-token: write # needed for push-image
    steps:
      - uses: actions/checkout@v6
      - name: Build and test
        uses: ./.github/actions/build-and-test
      - name: Push image
        uses: ./.github/actions/push-image
        with:
          tag: ${{ github.sha }}
          image_suffix: 'app'

  deploy_to_prod:
    name: Deploy to prod
    needs:
      - check-image
      - build-test-push-image
    if: ${{ needs.check-image.result == 'success' && (needs.build-test-push-image.result == 'success' || needs.build-test-push-image.result == 'skipped') }}
    permissions:
      contents: read
      id-token: write
    uses: navikt/su-se-bakover/.github/workflows/reusable-deploy.yml@master
    with:
      var: image=europe-north1-docker.pkg.dev/nais-management-233d/supstonad/su-se-bakover-app:${{ github.sha }}
      cluster: prod-gcp
      resource: .nais/prod-gcp.yaml
