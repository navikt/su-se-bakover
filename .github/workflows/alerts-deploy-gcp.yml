name: Deploy alerts to NAIS GCP(alerts) for loki/grafana

on:
  push:
    branches:
      - master
    paths:
      - 'alerts.yml'
      - '.github/workflows/alerts-deploy-gcp.yml'
  workflow_dispatch:

jobs:
  deploy_to_dev:
    name: Deploy to dev
    permissions:
      contents: read
      id-token: write # needed for push-image
    uses: navikt/su-se-bakover/.github/workflows/reusable-deploy.yml@master
    with:
      var: SLACK_ALERTS_CHANNEL=#su_alerts_dev,LOGS_URL_LOKI=https://grafana.nav.cloud.nais.io/goto/efq0y6eulatc0c?orgId=1
      cluster: dev-gcp
      resource: alerts.yml
  deploy_to_prod:
    name: Deploy to prod
    permissions:
      contents: read
      id-token: write # needed for push-image
    uses: navikt/su-se-bakover/.github/workflows/reusable-deploy.yml@master
    with:
      var: SLACK_ALERTS_CHANNEL=#su_alerts_prod,LOGS_URL_LOKI=https://grafana.nav.cloud.nais.io/goto/ffq0y43v6ll34a?orgId=1
      cluster: prod-gcp
      resource: alerts.yml