# Endringer her vil kunne medføre at behandlingskatalogen må oppdateres
query($ident: ID!, $historikk: Boolean!) {
    hentPerson(ident: $ident) {
        bostedsadresse(historikk: $historikk) {
            folkeregistermetadata {
                ajourholdstidspunkt
                gyldighetstidspunkt
                opphoerstidspunkt
                kilde
                aarsak
                sekvens
            }
            metadata {
                historisk
                endringer {
                    hendelseId
                }
            }
            vegadresse {
                husnummer
                husbokstav
                adressenavn
                postnummer
            }
            matrikkeladresse {
                postnummer
            }
        }
    }
}
